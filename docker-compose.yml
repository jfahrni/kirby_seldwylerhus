services:
  web:
    build: .
    volumes:
      - content:/var/www/app/content
      - accounts:/var/www/app/site/accounts
      - sessions:/var/www/app/site/sessions
      - media:/var/www/app/public/media
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pfadiheim.rule=Host(`www.pfadiheim-buelach.ch`)"
      - "traefik.http.routers.pfadiheim.entrypoints=websecure"
      - "traefik.http.routers.pfadiheim.tls.certresolver=letsencrypt"
      - "traefik.http.services.pfadiheim.loadbalancer.server.port=80"

volumes:
  content:
  accounts:
  sessions:
  media:

networks:
  traefik:
    external: true
